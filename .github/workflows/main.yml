name: Build Infinity PHAR

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Preparar estructura
        run: |
          rm -rf build
          mkdir -p build/src

          cp -r pocketmine build/src/
          cp -r raklib build/src/
          cp -r spl build/src/

      - name: Crear builder
        run: |
          cat > build/build.php <<'PHP'
          <?php

          $output = __DIR__ . "/Infinity.phar";

          if(file_exists($output)){
              unlink($output);
          }

          $phar = new Phar($output);
          $phar->startBuffering();

          $iterator = new RecursiveIteratorIterator(
              new RecursiveDirectoryIterator(__DIR__ . "/src", FilesystemIterator::SKIP_DOTS)
          );

          foreach($iterator as $file){
              $local = "src/" . substr($file->getPathname(), strlen(__DIR__ . "/src/"));
              $phar->addFile($file->getPathname(), $local);
          }

          $phar->setStub('<?php define("pocketmine\\PATH", "phar://". __FILE__ ."/"); require_once("phar://". __FILE__ ."/src/pocketmine/PocketMine.php");  __HALT_COMPILER(); ?>');

          $phar->stopBuffering();

          echo "Infinity.phar creado correctamente.\n";
          PHP

      - name: Compilar PHAR
        run: php -d phar.readonly=0 build/build.php

      - name: Reemplazar PHAR del repositorio
        run: |
          mv -f build/Infinity.phar ./Infinity.phar

      - name: Commit y Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Infinity.phar

          if git diff --cached --quiet; then
            echo "No hay cambios."
            exit 0
          fi

          git commit -m "Actualizar Infinity.phar"
          git push origin HEAD
